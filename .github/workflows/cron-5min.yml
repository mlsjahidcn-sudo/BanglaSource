# Every-5-minutes cron — group_buys/expire.
# Public repos can run scheduled workflows every 5 minutes.
# Idempotent + rate-limited at the API route (30/min/IP).
#
# Setup: see .github/workflows/cron-1min.yml.
name: Cron (5-min)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # manual trigger for testing
jobs:
  group-buys-expire:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/cron/group-buys/expire
        run: |
          curl -fsS --retry 3 --retry-delay 5 \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/group-buys/expire"